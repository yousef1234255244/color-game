<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>لعبة سهلة</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
    }
    .grid {
      display: grid;
      gap: 12px;
      justify-content: center;
      margin-top: 20px;
    }
    .box {
      width: 70px;
      height: 70px;
      cursor: pointer;
      border-radius: 8px;
    }

    .popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .popup-content {
      background: white;
      padding: 25px;
      border-radius: 10px;
      text-align: center;
    }

    .popup-content h1 {
      font-size: 24px;
    }
  </style>
</head>
<body>

<h2 id="levelText">المستوى: 1</h2>
<div class="grid" id="grid"></div>

<div class="popup" id="popup">
  <div class="popup-content">
    <h1 id="message"></h1>
    <button onclick="closePopup()">موافق</button>
  </div>
</div>

<script>
let level = 1;

function startGame() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  document.getElementById("levelText").innerText = "المستوى: " + level;

  // 😄 مربعات قليلة بالبداية
  let size = Math.min(2 + Math.floor(level / 2), 5);
  grid.style.gridTemplateColumns = `repeat(${size}, 70px)`;

  function randomColor() {
    return [
      Math.floor(Math.random() * 200),
      Math.floor(Math.random() * 200),
      Math.floor(Math.random() * 200)
    ];
  }

  function toRGB(c) {
    return `rgb(${c[0]}, ${c[1]}, ${c[2]})`;
  }

  let base = randomColor();

  // 😄 فرق واضح جدًا
  let diff = 80;

  let diffColor = [
    Math.min(base[0] + diff, 255),
    Math.min(base[1] + diff, 255),
    Math.min(base[2] + diff, 255)
  ];

  const total = size * size;
  const diffIndex = Math.floor(Math.random() * total);

  for (let i = 0; i < total; i++) {
    const div = document.createElement("div");
    div.classList.add("box");

    div.style.backgroundColor = i === diffIndex 
      ? toRGB(diffColor) 
      : toRGB(base);

    div.onclick = () => {
      if (i === diffIndex) {
        showPopup("مبروك 😄");
        level++;
      } else {
        showPopup("حظ أوفر");
        level = 1;
      }
    };

    grid.appendChild(div);
  }
}

function showPopup(text) {
  document.getElementById("message").innerText = text;
  document.getElementById("popup").style.display = "flex";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
  startGame();
}

startGame();
</script>

</body>
</html>
